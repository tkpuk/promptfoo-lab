# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

# Learn more about building a configuration: https://promptfoo.dev/docs/configuration/guide

description: '01-basic: A basic configuration with multiple prompts and tests.'

prompts:
  - 'Write a tweet about {{topic}}'
  - 'Write a concise, funny tweet about {{topic}}'

# providers:
#   - "openai:gpt-5-mini"
#   - "openai:gpt-5"

providers:
  - ollama:chat:llama3.1:8b
  - ollama:chat:mistral:7b

defaultTest:
  options:
    provider:
      text:
        # id: ollama:chat:llama3.1:8b
        # id: ollama:chat:mistral:7b
        # id: ollama:chat:qwen3:8b
        id: ollama:chat:gemma3:12b

tests:
  - vars:
      topic: bananas

  - vars:
      topic: avocado toast
    assert:
      # For more information on assertions, see https://promptfoo.dev/docs/configuration/expected-outputs

      # Make sure output contains the word "avocado"
      - type: icontains
        value: avocado

      # Prefer shorter outputs
      - type: javascript
        value: 1 / (output.length + 1)

  - vars:
      topic: new york city
    assert:
      # For more information on model-graded evals, see https://promptfoo.dev/docs/configuration/expected-outputs/model-graded
      - type: llm-rubric
        value: ensure that the output is funny
